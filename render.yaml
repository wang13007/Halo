services:
  - type: web
    name: halo-backend
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build:server
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: LONGFOR_AUTHORIZATION
        sync: false
      - key: LONGFOR_X_GAIA_API_KEY
        sync: false
      - key: LONGFOR_CASTGC
        sync: false
      - key: LONGFOR_QUERY_REPORT_URL
        sync: false
      - key: LONGFOR_USER_INFO_URL
        sync: false
